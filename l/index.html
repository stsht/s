  <style id="link-gate-lounge">
    body{
      --ease-out:cubic-bezier(.22,1,.36,1);

      position:fixed;inset:-20vmax;z-index:0;pointer-events:none;opacity:0.75;

        radial-gradient(circle at 75% 65%, rgba(138, 180, 248, 0.25) 0%, transparent 60%),
        radial-gradient(circle at 50% 15%, rgba(194, 231, 255, 0.35) 0%, transparent 55%);
      filter:blur(80px) saturate(110%);
      animation:drift 25s ease-in-out infinite alternate;
      will-change:transform;
    }
    @keyframes drift{
      0%  { transform:translate3d(-3%,-2%,0)  scale(1) rotate(0deg);    }
      33% { transform:translate3d(2%,3%,0)  scale(1.04) rotate(2deg); }
      66% { transform:translate3d(-2%,4%,0)   scale(0.98) rotate(-1deg); }
      100%{ transform:translate3d(1%,-1%,0)   scale(1.02) rotate(1deg); }
    }
    .center{
      z-index:2;
      padding:max(24px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));

    .gate-card.card{
      position:relative;width:min(100%,480px);margin:0;
      min-height:min(460px, calc(100dvh - 48px));
      padding:clamp(28px,5vw,44px);border-radius:28px;

      border:1px solid var(--line);

        0 1px 0 rgba(255,255,255,.60) inset,

      transition:opacity var(--dur-card) var(--ease-out),transform var(--dur-card) var(--ease-out);
    }
    .gate-card.is-visible{opacity:1;transform:translateY(0) scale(1)}
    .gate-card.is-leaving{opacity:0;transform:translateY(-6px) scale(1);pointer-events:none;transition-duration:var(--dur-switch)}
    .gate-brand{display:flex;align-items:center;justify-content:center;margin-bottom:14px}
    .gate-logo{display:block;width:min(200px,52vw);height:auto;margin:0!important}

      position:relative;overflow:hidden;isolation:isolate;contain:paint;width:100%;

      -webkit-transform:translate3d(0,0,0);transform:translate3d(0,0,0);

      </button>
      <div id="adminStatus" class="status ss-gate-status reveal" role="status" aria-live="polite"></div>
    </section>
  </div>
  <div id="appShell" class="shell hidden">
	    <header class="top reveal stagger-1">
		      <a class="brand-logo" href="/" aria-label="Back to StarShots homepage"><img class="mark ss-logo-top" src="/logo-hero.png" alt="StarShots logo"></a>
	    </header>
    <main class="grid">
      <section class="card reveal stagger-2"><form id="form" class="form" novalidate><div class="scroll">
        <div class="dual"><label class="field"><span>Title <i class="req">*</i></span><select id="title"><option selected>Ms.</option><option>Mr.</option></select></label><label class="field"><span>Name <i class="req">*</i></span><input id="clientName" type="text" placeholder="Client name" autocomplete="name"></label></div>
        <label class="field"><span>Folder Name <i class="req">*</i></span><input id="folderName" type="text" placeholder="260427 Anson M Luis ( 6th Birthday )" autocomplete="off"></label>
        <div class="dual"><label class="field"><span>Gallery Code</span><input id="baseSlug" class="readonly" readonly tabindex="-1" placeholder="260427-anson"></label><label class="field"><span>Password</span><input id="password" class="readonly" readonly tabindex="-1" placeholder="Generated after save"></label></div>
        <div class="services"><div class="service reveal stagger-3"><div class="svc-head"><span class="chip">GD</span><span class="svc-name">Google Drive</span></div><input id="gd" type="text" inputmode="url" placeholder="https://drive.google.com/..." spellcheck="false"></div><div class="service reveal stagger-4"><div class="svc-head"><span class="chip">DB</span><span class="svc-name">Dropbox</span></div><input id="db" type="text" inputmode="url" placeholder="https://dropbox.com/..." spellcheck="false"></div><div class="service reveal stagger-5"><div class="svc-head"><span class="chip">WT</span><span class="svc-name">WeTransfer</span></div><input id="wt" type="text" inputmode="url" placeholder="https://we.tl/..." spellcheck="false"></div><div class="service reveal stagger-6"><div class="svc-head"><span class="chip">TN</span><span class="svc-name">TransferNow</span></div><input id="tn" type="text" inputmode="url" placeholder="https://transfernow.net/..." spellcheck="false"></div></div>
      </div><div class="bottom"><div class="actions"><button class="btn secondary" id="clearBtn" type="button">Clear</button><button class="btn primary" type="submit">Generate</button></div><div id="status" class="status"></div></div></form></section>
      <section class="card preview reveal stagger-3"><div class="preview-head"><div><strong>Generated Text</strong><div style="color:var(--soft);font-size:13px;margin-top:2px">Short link + password</div></div><button id="copyBtn" class="ghost" type="button">Copy</button></div><div class="mini"><div class="stat reveal stagger-4" id="deliveryCard"><small>Short Link</small><b id="deliveryPreview">starshots.pages.dev</b></div><div class="stat reveal stagger-5" id="passwordCard"><small>Password</small><b id="passPreview">—</b></div></div><textarea id="output" readonly placeholder="Generated delivery message will appear here..."></textarea></section>
    </main>
  </div>
  <script>
    const $ = (id) => document.getElementById(id);
    const SHARED_ADMIN_KEY = 'starshots_admin_session_v1';
    const INVOICE_LINK_HANDOFF_KEY = 'starshots_invoice_client_handoff_v1';
    const ADMIN_SESSION_MS = 15 * 60 * 1000;
    const PUBLIC_SITE = 'https://starshots.pages.dev';
    const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches && !document.documentElement.classList.contains('ss-force-motion');
    const adminGate = $('adminGate'), appShell = $('appShell'), adminPassword = $('adminPassword'), adminOpen = $('adminOpen'), adminStatus = $('adminStatus'), toggleAdminPass = $('toggleAdminPass');
    const adminOpenLabel = adminOpen.querySelector('.label');
    const form = $('form'), title = $('title'), clientName = $('clientName'), folderName = $('folderName'), baseSlug = $('baseSlug'), password = $('password'), output = $('output'), statusEl = $('status'), deliveryPreview = $('deliveryPreview'), passPreview = $('passPreview'), deliveryCard = $('deliveryCard'), passwordCard = $('passwordCard');
    const linkInputs = { gd: $('gd'), db: $('db'), wt: $('wt'), tn: $('tn') };
    let savedDelivery = null;
    let linkedInvoiceId = '';
    const eyeSvg = '<svg viewBox="0 0 24 24"><path d="M1.75 12S5.5 5.5 12 5.5 22.25 12 22.25 12 18.5 18.5 12 18.5 1.75 12 1.75 12Z"/><circle cx="12" cy="12" r="3.25"/></svg>';
    const eyeOffSvg = '<svg viewBox="0 0 24 24"><path d="M2.5 2.5 21.5 21.5"/><path d="M9.9 5.9A13.2 13.2 0 0 1 12 5.5c6.5 0 10.25 6.5 10.25 6.5a18 18 0 0 1-3.45 4.38"/><path d="M6.03 8.03C3.56 9.96 1.75 12 1.75 12S5.5 18.5 12 18.5c1.87 0 3.53-.38 4.98-1.04"/><path d="M10.59 10.59A3.25 3.25 0 0 0 15.18 15.18"/></svg>';

    function isTouchViewport() { return window.matchMedia('(max-width: 640px), (pointer: coarse)').matches; }
    function focusSoon(el, options = {}) {
      if (!el) return;
      const { allowTouch = false, delay = 60 } = options;
      if (!allowTouch && isTouchViewport()) return;
      setTimeout(() => el.focus({ preventScroll: true }), delay);
    }
    function revealIn(el, delay) { if (el) setTimeout(() => el.classList.add('is-visible'), delay); }
    function showReveals(root) {
      requestAnimationFrame(() => root.querySelectorAll('.reveal').forEach((el) => el.classList.add('is-visible')));
    }
    function stageAccessIntro() {
      const gateCard = adminGate.querySelector('.gate-card');
      if (!gateCard) return;
      if (window.StarShotsGate && window.StarShotsGate.intro) {
        const handled = window.StarShotsGate.intro(gateCard, { root: adminGate, button: adminOpen, input: adminPassword });
        if (handled || gateCard.dataset.ssGateIntro === 'running' || gateCard.dataset.introState === 'running' || gateCard.classList.contains('is-mounted') || gateCard.classList.contains('is-visible')) return;
      }
      if (gateCard.classList.contains('is-visible')) return;
      const isMobile = window.matchMedia('(max-width: 640px), (pointer: coarse)').matches;
      if (reduceMotion) {
        gateCard.classList.add('is-visible');
        adminGate.querySelectorAll('.reveal').forEach((el) => el.classList.add('is-visible'));
        focusSoon(adminPassword);
        return;
      }
      requestAnimationFrame(() => {
        gateCard.classList.add('is-visible');
        const reveals = adminGate.querySelectorAll('.reveal');
        const stagger = isMobile ? 75 : 90;
        const startAt = isMobile ? 180 : 300;
        reveals.forEach((el, index) => revealIn(el, startAt + index * stagger));
        const doneAt = startAt + reveals.length * stagger + 260;
        setTimeout(() => {
          adminOpen.classList.add('is-sheen');
          setTimeout(() => adminOpen.classList.remove('is-sheen'), 3600);
        }, doneAt);
        setTimeout(() => focusSoon(adminPassword), isMobile ? 900 : 720);
        setTimeout(() => gateCard.classList.add('is-settled'), doneAt + 520);
      });
    }
    function rememberAdminSession() {
      localStorage.removeItem(SHARED_ADMIN_KEY);
      sessionStorage.setItem(SHARED_ADMIN_KEY, JSON.stringify({ expiresAt: Date.now() + ADMIN_SESSION_MS }));
    }
    function clearAdminSession() {
      sessionStorage.removeItem('starshots_admin_password');
      sessionStorage.removeItem('ss_admin_password');
      sessionStorage.removeItem(SHARED_ADMIN_KEY);
      localStorage.removeItem(SHARED_ADMIN_KEY);
    }
    function hasRememberedAdminSession() {
      localStorage.removeItem(SHARED_ADMIN_KEY);
      try {
        const raw = sessionStorage.getItem(SHARED_ADMIN_KEY);
        const saved = raw ? JSON.parse(raw) : null;
        if (saved && Number(saved.expiresAt) > Date.now()) return true;
        if (raw) { clearAdminSession(); return false; }
      } catch {
        clearAdminSession();
        return false;
      }
      return false;
    }
    function normalizeInvoiceTitle(value) {
      return /^mr\.?$/i.test(cleanText(value)) ? 'Mr.' : 'Ms.';
    }
    function folderCodeFromDate(value) {
      const raw = String(value || '').trim();
      const iso = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (iso) return iso[1].slice(2) + iso[2] + iso[3];
      const slash = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (slash) return slash[3].slice(2) + slash[2].padStart(2, '0') + slash[1].padStart(2, '0');
      return '';
    }
    function readInvoiceClientHandoff() {
      const params = new URLSearchParams(location.search);
      const fromUrl = {
        title: params.get('title') || '',
        name: params.get('name') || '',
        eventDate: params.get('eventDate') || '',
        invoiceId: params.get('invoiceId') || ''
      };
      if (cleanText(fromUrl.name)) return fromUrl;
      try {
        const saved = JSON.parse(localStorage.getItem(INVOICE_LINK_HANDOFF_KEY) || 'null');
        if (saved && cleanText(saved.name) && Date.now() - Number(saved.savedAt || 0) < 1000 * 60 * 60 * 24 * 7) return saved;
      } catch {}
      return null;
    }
    function applyInvoiceClientHandoff() {
      const handoff = readInvoiceClientHandoff();
      if (!handoff) return null;
      const nameValue = cleanText(handoff.name);
      if (!nameValue) return null;
      if (!cleanText(clientName.value)) clientName.value = nameValue;
      title.value = normalizeInvoiceTitle(handoff.title || title.value);
      linkedInvoiceId = cleanText(handoff.invoiceId || '');
      if (!cleanText(folderName.value)) {
        const code = folderCodeFromDate(handoff.eventDate);
        if (code) folderName.value = normalizeFolder(code + ' ' + nameValue);
      }
      return { title: title.value, name: nameValue };
    }
    function revealApp(skipGate = false) {
      const showApp = () => {
        appShell.classList.remove('hidden');
        appShell.classList.remove('is-settled');
        const handoff = applyInvoiceClientHandoff();
        refresh();
        if (handoff) setStatus('Loaded ' + handoff.title + ' ' + handoff.name + ' from invoice.', 'success');
        showReveals(appShell);
        setTimeout(() => appShell.classList.add('is-settled'), reduceMotion ? 0 : 1700);
        focusSoon(clientName);
      };
      const gateCard = adminGate.querySelector('.gate-card');
      if (skipGate || adminGate.classList.contains('hidden')) {
        adminGate.classList.add('hidden');
        showApp();
        return;
      }
      gateCard.classList.add('is-leaving');
      setTimeout(() => {
        adminGate.classList.add('hidden');
        gateCard.classList.remove('is-mounted', 'is-visible', 'is-leaving', 'is-settled');
        showApp();
      }, reduceMotion ? 0 : 500);
    }
    async function checkAdmin(pass = '') {
      const body = pass ? { password: pass } : {};
      const res = await fetch('/api/admin-check', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const data = await res.json().catch(() => ({}));
      if (!res.ok || !data.ok) throw new Error(data.error || 'Wrong password.');
      return true;
    }
    async function openAdmin() {
      const pass = adminPassword.value.trim();
      if (!pass) {
        adminStatus.textContent = 'Access key required.';
        adminStatus.className = 'status error';
        focusSoon(adminPassword);
        return;
      }
      adminStatus.textContent = 'Checking...';
      adminStatus.className = 'status';
      adminOpen.disabled = true;
      adminOpen.classList.add('is-loading');
      const original = adminOpenLabel.textContent;
      adminOpenLabel.textContent = 'Opening...';
      try {
        await checkAdmin(pass);
        rememberAdminSession();
        adminStatus.textContent = '';
        revealApp();
      } catch (e) {
        adminStatus.textContent = e.message || 'Wrong password.';
        adminStatus.className = 'status error';
        adminPassword.classList.add('invalid');
        setTimeout(() => adminPassword.classList.remove('invalid'), 900);
      } finally {
        adminOpen.disabled = false;
        adminOpen.classList.remove('is-loading');
        adminOpenLabel.textContent = original;
      }
    }
    function toggleGatePassword() {
      const show = adminPassword.type === 'password';
      adminPassword.type = show ? 'text' : 'password';
      toggleAdminPass.innerHTML = show ? eyeOffSvg : eyeSvg;
      toggleAdminPass.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
      adminPassword.focus();
    }
    adminOpen.onclick = openAdmin;
    toggleAdminPass.onclick = toggleGatePassword;
    adminPassword.onkeydown = (e) => { if (e.key === 'Enter') openAdmin(); };
    (async () => {
      if (hasRememberedAdminSession()) {
        try { await checkAdmin(); rememberAdminSession(); revealApp(true); return; }
        catch { clearAdminSession(); }
      }
      stageAccessIntro();
    })();

    function setTheme(mode) {
      document.documentElement.dataset.theme = mode;
      localStorage.setItem('ss_theme', mode);
      document.querySelectorAll('.theme button').forEach((b) => b.classList.toggle('active', b.dataset.theme === mode));
    }
    document.querySelectorAll('.theme button').forEach((b) => { b.onclick = () => setTheme(b.dataset.theme); });
    setTheme('auto');

    function setStatus(msg = '', state = '') { statusEl.textContent = msg; statusEl.className = 'status ' + state; }
    function cleanText(v) { return String(v || '').replace(/\s+/g, ' ').trim(); }
    function sanitize(v) {
      return String(v || '')
        .normalize('NFKD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/["'’`]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-+|-+$/g, '');
    }
    function normalizeFolder(v) { return cleanText(String(v || '').replace(/\s*\(/g, ' ( ').replace(/\s*\)/g, ' ) ')); }
    function stripBracketed(v) { return v.replace(/\([^)]*\)|\[[^\]]*\]|\{[^}]*\}/g, ' '); }
    function extract(folder) {
      const normalized = normalizeFolder(folder);
      const close = normalized.lastIndexOf(')');
      const head = close >= 0 ? normalized.slice(0, close + 1) : normalized;
      const suffix = close >= 0 ? normalized.slice(close + 1).trim() : '';
      const parts = stripBracketed(head).split(/\s+/).map(sanitize).filter(Boolean);
      let date = '', cursor = 0;
      if (/^\d{6}$/.test(parts[0] || '')) { date = parts[0]; cursor = 1; }
      else if (/^\d{8}$/.test(parts[0] || '')) { date = parts[0].slice(2); cursor = 1; }
      else {
        const now = new Date();
        date = String(now.getFullYear()).slice(-2) + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
      }
      const name = parts[cursor] || '';
      const suff = sanitize(suffix);
      return { date, name, suffix: suff, normalized };
    }
    function buildSlug(folder) {
      const p = extract(folder);
      if (!p.name) return '';
      const arr = [p.date, p.name];
      if (p.suffix && p.suffix !== p.name) arr.push(p.suffix);
      return arr.join('-').slice(0, 64).replace(/-+$/, '');
    }
    function buildPassword(folder) {
      const p = extract(folder);
      const d = p.date;
      return /^\d{6}$/.test(d) ? d.slice(4, 6) + d.slice(2, 4) + d.slice(0, 2) : '';
    }
    function normalizeUrl(v) {
      v = String(v || '').trim();
      if (!v) return '';
      if (!/^https?:\/\//i.test(v) && /^(?:[a-z0-9-]+\.)+[a-z]{2,}(?:[/:?#].*)?$/i.test(v)) v = 'https://' + v;
      try {
        const u = new URL(v);
        if (!/^https?:$/i.test(u.protocol) || !u.hostname.includes('.')) return '';
        return u.toString();
      } catch { return ''; }
    }
    function prettyCode(slug) {
      const parts = String(slug || '').split('-').filter(Boolean);
      if (!parts.length) return '';
      return [parts[0], ...parts.slice(1).map((w) => w ? w.charAt(0).toUpperCase() + w.slice(1).toLowerCase() : w)].join(' ');
    }
    function sameSaved(info, name) {
      return savedDelivery
        && savedDelivery.slug === info.slug
        && savedDelivery.name === name
        && savedDelivery.shortLink;
    }
    function refresh(resetSaved = false) {
      if (resetSaved) savedDelivery = null;
      const f = normalizeFolder(folderName.value);
      const slug = buildSlug(f);
      const pass = savedDelivery?.pass || '';
      const name = cleanText(clientName.value);
      const galleryCode = prettyCode(slug);
      const info = {
        folder: f,
        slug,
        pass,
        shortCode: savedDelivery?.shortCode || '',
        shortLink: '',
        galleryCode,
        directUrl: slug ? PUBLIC_SITE + '/g/' + slug : PUBLIC_SITE
      };
      if (sameSaved(info, name)) info.shortLink = savedDelivery.shortLink;
      baseSlug.value = slug;
      password.value = pass;
      deliveryPreview.textContent = info.shortLink ? info.shortLink.replace(/^https?:\/\//, '') : (slug ? 'Save first' : PUBLIC_SITE.replace(/^https?:\/\//, ''));
      passPreview.textContent = pass || 'After save';
      return info;
    }
    function buildMessage(name, info) {
      return `Dear ${cleanText(title.value)} ${cleanText(name)},

With sincere appreciation, your StarShots delivery files have been prepared and are now ready for your kind attention.

You may access them through the details below:

• Link: ${info.shortLink || info.directUrl}
• Password: ${info.pass}

Kindly download the files within the stated availability period.

It has been our pleasure to serve you, and we look forward to welcoming you again.

Warm regards,
StarShots`;
    }
    async function copy(text) {
      try { await navigator.clipboard.writeText(text); return true; }
      catch { output.focus(); output.select(); return document.execCommand('copy'); }
    }
    function mark(el) { el.classList.add('invalid'); setTimeout(() => el.classList.remove('invalid'), 900); }
    function flashCard(el) { el.classList.add('copied'); setTimeout(() => el.classList.remove('copied'), 850); }
    async function copyCardValue(type) {
      const info = refresh();
      const text = savedDelivery?.pass || info.pass || '';
      if (!text) return;
      const ok = await copy(text);
      if (ok) { flashCard(passwordCard); setStatus('Copied.', 'success'); }
    }
    function openShortLink() {
      const info = refresh();
      const url = info.shortLink || savedDelivery?.shortLink || '';
      if (!url) {
        setStatus('Generate first to open the short link.', 'error');
        return;
      }
      window.open(url, '_blank', 'noopener,noreferrer');
      setStatus('Opened short link.', 'success');
    }
    async function submit(e) {
      e.preventDefault();
      setStatus('');
      const info = refresh();
      const name = cleanText(clientName.value);
      if (!name) { mark(clientName); setStatus('Please fill client name.', 'error'); return; }
      if (!info.folder || !info.slug) { mark(folderName); setStatus('Please use folder name starting with YYMMDD + name.', 'error'); return; }
      const links = Object.entries(linkInputs).map(([service, el]) => ({ service, originalUrl: normalizeUrl(el.value) })).filter((x) => x.originalUrl);
      if (!links.length) { setStatus('Please fill at least one delivery link.', 'error'); return; }

      output.value = '';
      deliveryPreview.textContent = 'Saving...';
      passPreview.textContent = 'Generating...';
      setStatus('Saving delivery...');
      try {
        const res = await fetch('/api/save', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: title.value,
            clientName: name,
            folderName: info.folder,
            baseSlug: info.slug,
            shortCode: '',
            deliveryYear: 2000 + Number(info.slug.slice(0, 2)),
            deliveryMonth: Number(info.slug.slice(2, 4)),
            generatedTextWhatsapp: '',
            generatedTextInstagram: '',
            invoiceId: linkedInvoiceId,
            links
          })
        });
        const data = await res.json();
        if (!res.ok || !data.ok) throw new Error(data.error || 'Save failed.');
        const finalLink = data.shortLink || (data.shortUrl ? PUBLIC_SITE + data.shortUrl : info.directUrl);
        const finalPass = data.password || '';
        savedDelivery = { slug: info.slug, pass: finalPass, name, shortCode: data.shortCode || '', shortLink: finalLink };
        const finalInfo = { ...info, pass: finalPass, shortCode: data.shortCode || '', shortLink: finalLink };
        const finalMsg = data.generatedText || buildMessage(name, finalInfo);
        output.value = finalMsg;
        deliveryPreview.textContent = finalLink.replace(/^https?:\/\//, '');
        password.value = finalPass;
        passPreview.textContent = finalPass || '—';
        const copied = await copy(finalMsg);
        setStatus(copied ? 'Saved and copied.' : 'Saved. Please copy manually.', 'success');
      } catch (err) {
        if (String(err.message || '').toLowerCase().includes('unauthorized')) clearAdminSession();
        setStatus(err.message || 'Save failed.', 'error');
        refresh();
      }
    }
    function markDirty() {
      savedDelivery = null;
      output.value = '';
      setStatus('');
      refresh();
    }
    form.addEventListener('submit', submit);
    [title, clientName, folderName, ...Object.values(linkInputs)].forEach((input) => input.addEventListener('input', markDirty));
    folderName.addEventListener('blur', () => { folderName.value = normalizeFolder(folderName.value); refresh(true); });
    $('clearBtn').onclick = () => {
      form.reset();
      savedDelivery = null;
      linkedInvoiceId = '';
      title.value = 'Ms.';
      output.value = '';
      Object.values(linkInputs).forEach((i) => { i.value = ''; });
      setStatus('');
      refresh();
      focusSoon(clientName);
    };
    $('copyBtn').onclick = async () => {
      if (!output.value.trim()) { setStatus('Generate first.', 'error'); return; }
      setStatus(await copy(output.value) ? 'Copied.' : 'Please copy manually.', 'success');
    };
    deliveryCard.onclick = openShortLink;
    passwordCard.onclick = () => copyCardValue('password');
    form.addEventListener('keydown', (e) => { if (e.key === 'Enter' && e.target.tagName === 'INPUT') { e.preventDefault(); form.requestSubmit(); } });
    refresh();
  </script>
</body>
</html>
