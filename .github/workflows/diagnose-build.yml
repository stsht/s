name: Diagnose current build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check Pages worker syntax
        run: node --check _worker.js
      - name: Report Pages worker size
        run: |
          echo "Worker bytes:"
          wc -c _worker.js dist/_worker.js
