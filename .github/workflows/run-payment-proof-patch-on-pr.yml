name: Run payment proof patch on PR

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.head_ref == 'feature/persistent-payment-proofs'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/persistent-payment-proofs
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Apply focused patch
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python3 <<'PY' 2>&1 | tee patch-output.txt
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/apply-payment-proof-storage.yml').read_text()
          marker = "python3 <<'PY'\n"
          if marker not in workflow:
              raise SystemExit('Embedded patch script not found.')
          script = workflow.split(marker, 1)[1].split('\n          PY', 1)[0]
          exec(compile(textwrap.dedent(script), 'payment-proof-patch.py', 'exec'))
          PY

      - name: Upload patch diagnostics
        if: steps.patch.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: payment-proof-patch-output
          path: patch-output.txt

      - name: Stop after patch failure
        if: steps.patch.outcome == 'failure'
        run: exit 1

      - name: Install dependencies
        if: steps.patch.outcome == 'success'
        run: npm ci

      - name: Build
        if: steps.patch.outcome == 'success'
        run: npm run build

      - name: Commit verified patch
        if: steps.patch.outcome == 'success'
        shell: bash
        run: |
          rm -f .github/workflows/apply-payment-proof-storage.yml
          rm -f .github/workflows/run-payment-proof-patch-on-pr.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _worker.js src/pages/db/RecordRow.jsx src/pages/db/DatabaseList.css db-migration-part-12.sql .github/workflows
          git commit -m "[payment-proof-bot] Store payment proofs persistently"
          git push origin HEAD:feature/persistent-payment-proofs
