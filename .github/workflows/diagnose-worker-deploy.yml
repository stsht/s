name: Diagnose Pages worker deploy

on:
  pull_request:
    branches:
      - main

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node --check _worker.js
      - run: wc -c _worker.js dist/_worker.js
