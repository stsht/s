<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>StarShots</title>
  <style>
    :root{color-scheme:light;--bg:#F6F6F3;--bg2:#F6F6F3;--card:#FFFFFF;--ink:#1f1a17;--soft:#69645f;--line:#e4e2dc;--accent:#b88468;--shadow:0 30px 90px rgba(30,30,28,.10);--glow1:rgba(255,255,255,.66);--glow2:rgba(212,205,188,.08)}
    @media(prefers-color-scheme:dark){:root{color-scheme:dark;--bg:#11110F;--bg2:#11110F;--card:#171613;--ink:#f4eee5;--soft:#b8aea2;--line:#2b2823;--accent:#ca9876;--shadow:0 30px 90px rgba(0,0,0,.36);--glow1:rgba(255,239,216,.045);--glow2:rgba(202,152,118,.06)}.logo{filter:brightness(0) invert(1) sepia(.08) saturate(.7);opacity:.92}}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%}body{min-height:100dvh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);padding:18px}.wrap{min-height:calc(100dvh - 36px);display:grid;place-items:center}.card{width:min(100%,720px);background:var(--card);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:38px;padding:42px 34px;text-align:center;transform:translateY(-20px);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px)}.logo{width:min(390px,78vw);display:block;margin:0 auto 24px}.construct{width:min(260px,58vw);margin:6px auto 22px;display:block;color:var(--accent)}.pill{display:inline-flex;align-items:center;gap:8px;margin:4px auto 18px;padding:8px 13px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.22);color:var(--soft);font-size:12px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}h1{margin:0 0 10px;font-size:clamp(32px,5vw,52px);letter-spacing:-.04em}p{margin:0;color:var(--soft);line-height:1.55}.ig{display:inline-flex;align-items:center;gap:10px;margin-top:24px;color:var(--ink);text-decoration:none;font-size:18px;font-weight:850}.ig svg{width:28px;height:28px}.ig:hover{opacity:.72}@media(max-width:520px){.card{padding:32px 22px}.logo{width:min(330px,84vw)}.construct{width:min(220px,70vw)}.ig{font-size:17px}}
  </style>
</head>
<body>
  <div class="wrap"><main class="card"><a href="/"><img class="logo" src="/logo-hero.png" alt="StarShots logo"></a><svg class="construct" viewBox="0 0 320 180" aria-hidden="true"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="8" opacity=".9"><path d="M56 142h208"/><path d="M92 142l44-76h48l44 76"/><path d="M118 112h84"/><path d="M136 66l-18-28h84l-18 28"/><path d="M160 66v76"/><path d="M70 142l-22 26M250 142l22 26"/></g><g fill="currentColor" opacity=".18"><circle cx="54" cy="44" r="20"/><circle cx="268" cy="58" r="14"/><circle cx="242" cy="28" r="7"/></g></svg><div class="pill">Private System</div><h1>We Are Refining This Space</h1><p>StarShots private delivery is being carefully polished for a cleaner, smoother client experience.</p><a class="ig" href="https://instagram.com/starshots.id" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="6.5" r="1.3" fill="currentColor"/></svg><span>@starshots.id</span></a></main></div>
</body>
</html>
