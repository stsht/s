<!DOCTYPE html>
<html lang="en" class="ss-force-motion">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#f3f7fb">
  <title>StarShots Private Delivery</title>
  <link rel="stylesheet" href="/animate.css">
  <link rel="stylesheet" href="/gate.css">
  <script src="/animate.js"></script>
  <script src="/gate.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
    :root{
      --bg:#f3f7fb;
      --ink:#1f1a17;
      --soft:#69645f;
      --line:#e4e2dc;
      --accent:#5f95f5;
      --accent2:#4f86ee;
      color-scheme:light;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%}
    body{
      min-height:100dvh;
      padding:max(24px, env(safe-area-inset-top)) 18px max(24px, env(safe-area-inset-bottom));
      color:var(--ink);
      background:
        radial-gradient(1100px 620px at 18% 8%, rgba(66,133,244,.08), transparent 60%),
        radial-gradient(900px 560px at 82% 92%, rgba(138,180,248,.08), transparent 55%),
        var(--bg);
      font:500 14px/1.45 "Plus Jakarta Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-font-smoothing:antialiased;
    }
    .delivery-shell{min-height:calc(100dvh - 48px);display:grid;place-items:center}
    .delivery-links{display:grid;gap:12px;margin-top:24px}
    .delivery-link{
      display:flex;align-items:center;justify-content:space-between;gap:16px;
      min-height:54px;padding:0 18px;border:1px solid var(--line);border-radius:16px;
      color:var(--ink);background:#fff;text-decoration:none;font-weight:800;
      box-shadow:0 12px 28px -24px rgba(31,26,23,.3);
      transition:transform .22s cubic-bezier(.22,1,.36,1),border-color .22s cubic-bezier(.22,1,.36,1),box-shadow .22s cubic-bezier(.22,1,.36,1);
    }
    .delivery-link span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .delivery-link svg{width:18px;height:18px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex:0 0 auto;color:var(--accent)}
    @media(hover:hover) and (pointer:fine){
      .delivery-link:hover{transform:translateY(-1px);border-color:rgba(95,149,245,.55);box-shadow:0 18px 34px -24px rgba(95,149,245,.38)}
    }
    .delivery-note{margin:16px 0 0;color:var(--soft);font-size:12px;font-weight:700;text-align:center}
  </style>
</head>
<body>
  <main class="delivery-shell">
    <section id="gateCard" class="ss-gate-card" data-ss-gate-card aria-labelledby="gateTitle">
      <div class="ss-gate-brand reveal" data-reveal>
        <img class="ss-gate-logo ss-logo-hero" src="/logo-hero.png" alt="StarShots">
      </div>
      <p class="ss-gate-eyebrow reveal" data-reveal><span class="rule"></span><span class="dot" aria-hidden="true"></span>Private Workspace<span class="rule"></span></p>
      <h1 id="gateTitle" class="mask-reveal ss-gate-title reveal" data-reveal><span>Private Delivery</span></h1>

      <div id="accessField" class="ss-gate-field reveal" data-reveal>
        <label class="ss-gate-label" for="accessKey">Access key</label>
        <div class="password-wrap">
          <input id="accessKey" type="password" inputmode="text" autocomplete="off" autocapitalize="off" spellcheck="false" data-ss-gate-input>
          <button id="togglePass" class="eye-btn" type="button" aria-label="Show access key">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M1.75 12S5.5 5.5 12 5.5 22.25 12 22.25 12 18.5 18.5 12 18.5 1.75 12 1.75 12Z"/><circle cx="12" cy="12" r="3.25"/></svg>
          </button>
        </div>
      </div>

      <button id="openBtn" class="ss-gate-button reveal" data-ss-gate-button data-reveal type="button">
        <span class="spin" aria-hidden="true"></span>
        <span class="label">Sign In</span>
      </button>
      <p id="status" class="ss-gate-status reveal" data-reveal role="status" aria-live="polite"></p>
      <div id="links" class="delivery-links" hidden></div>
      <p id="note" class="delivery-note" hidden>Links are available for this session.</p>
    </section>
  </main>

  <script>
    const reduceMotion=window.matchMedia('(prefers-reduced-motion: reduce)').matches&&!document.documentElement.classList.contains('ss-force-motion');
    const gate=document.getElementById('gateCard');
    const title=document.getElementById('gateTitle').querySelector('span');
    const accessField=document.getElementById('accessField');
    const pass=document.getElementById('accessKey');
    const togglePass=document.getElementById('togglePass');
    const openBtn=document.getElementById('openBtn');
    const openLabel=openBtn.querySelector('.label');
    const statusEl=document.getElementById('status');
    const linksEl=document.getElementById('links');
    const noteEl=document.getElementById('note');
    const eyeSvg='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M1.75 12S5.5 5.5 12 5.5 22.25 12 22.25 12 18.5 18.5 12 18.5 1.75 12 1.75 12Z"/><circle cx="12" cy="12" r="3.25"/></svg>';
    const eyeOffSvg='<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.5 2.5 21.5 21.5"/><path d="M9.9 5.9A13.2 13.2 0 0 1 12 5.5c6.5 0 10.25 6.5 10.25 6.5a18 18 0 0 1-3.45 4.38"/><path d="M6.03 8.03C3.56 9.96 1.75 12 1.75 12S5.5 18.5 12 18.5c1.87 0 3.53-.38 4.98-1.04"/><path d="M10.59 10.59A3.25 3.25 0 0 0 15.18 15.18"/></svg>';

    function deliverySlug(){
      const parts=location.pathname.split('/').filter(Boolean);
      if(parts[0]&&parts[0].toLowerCase()==='g')return parts[1]||'';
      return parts[0]||'';
    }
    function isTouchViewport(){return window.matchMedia('(max-width: 640px), (pointer: coarse)').matches}
    function focusSoon(el,allowTouch=false){if(!el)return;if(!allowTouch&&isTouchViewport())return;setTimeout(()=>el.focus({preventScroll:true}),70)}
    function stageIntro(){
      if(window.StarShotsGate?.intro){
        const handled=window.StarShotsGate.intro(gate,{root:gate,button:openBtn,input:pass});
        if(handled||gate.dataset.ssGateIntro==='running'||gate.classList.contains('is-mounted')||gate.classList.contains('is-visible'))return;
      }
      gate.classList.add('is-mounted','is-visible');
      gate.querySelectorAll('.reveal').forEach(el=>el.classList.add('is-visible'));
      focusSoon(pass);
    }
    function setStatus(message,tone='info'){
      statusEl.textContent=message;
      statusEl.className=`ss-gate-status is-visible${tone==='error'?' error':''}`;
    }
    function togglePassword(){
      const show=pass.type==='password';
      pass.type=show?'text':'password';
      togglePass.innerHTML=show?eyeOffSvg:eyeSvg;
      togglePass.setAttribute('aria-label',show?'Hide access key':'Show access key');
      focusSoon(pass,true);
    }
    function linkIcon(){
      return '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 17 17 7"/><path d="M9 7h8v8"/></svg>';
    }
    function renderLinks(data){
      const available=(data.links||[]).filter(item=>item&&item.url);
      linksEl.innerHTML=available.map(item=>`<a class="delivery-link" href="${item.url}" target="_blank" rel="noopener" data-service="${item.service}"><span>${item.label||item.service}</span>${linkIcon()}</a>`).join('');
      linksEl.hidden=false;
      noteEl.hidden=false;
      accessField.hidden=true;
      openBtn.hidden=true;
      setStatus('');
      const delivery=data.delivery||{};
      title.textContent=delivery.clientName?`${delivery.clientName}`:'Private Delivery';
      linksEl.querySelectorAll('a').forEach(link=>{
        link.addEventListener('click',()=>{fetch('/api/click',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({deliveryId:delivery.id,service:link.dataset.service})}).catch(()=>{})});
      });
      requestAnimationFrame(()=>linksEl.querySelectorAll('.delivery-link').forEach((el,i)=>setTimeout(()=>el.classList.add('is-visible'),reduceMotion?0:i*60)));
    }
    async function unlock(){
      const slug=deliverySlug();
      const password=pass.value.trim();
      if(!slug){setStatus('Delivery link not found.','error');return}
      if(!password){setStatus('Access key required.','error');focusSoon(pass,true);return}
      setStatus('Checking...');
      openBtn.disabled=true;openBtn.classList.add('is-loading');openLabel.textContent='Opening...';
      try{
        const res=await fetch('/api/unlock',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({slug,password})});
        const data=await res.json().catch(()=>({}));
        if(!res.ok||!data.ok)throw new Error(data.error||'Wrong password.');
        renderLinks(data);
      }catch(e){
        setStatus(e.message||'Wrong password.','error');
        focusSoon(pass,true);
      }finally{
        openBtn.disabled=false;openBtn.classList.remove('is-loading');openLabel.textContent='Sign In';
      }
    }
    togglePass.addEventListener('click',togglePassword);
    openBtn.addEventListener('click',unlock);
    pass.addEventListener('keydown',event=>{if(event.key==='Enter')unlock()});
    stageIntro();
  </script>
</body>
</html>
