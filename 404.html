<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>StarShots · 404</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap');
    :root{color-scheme:light dark;--bg:#11110f;--card:#171613;--ink:#f4eee5;--soft:#b8aea2;--line:#2b2823;--gold:#ca9876;--shadow:0 36px 90px rgba(0,0,0,.38)}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%}body{min-height:100dvh;display:grid;place-items:center;padding:20px;font-family:"Cormorant Garamond","Times New Roman",Georgia,serif;color:var(--ink);background:radial-gradient(900px 560px at 24% 10%,rgba(202,152,118,.10),transparent 60%),radial-gradient(720px 520px at 80% 86%,rgba(244,238,229,.07),transparent 56%),var(--bg)}
    .card{width:min(720px,100%);padding:clamp(34px,6vw,58px) clamp(24px,5vw,42px);border:1px solid var(--line);border-radius:34px;background:linear-gradient(180deg,rgba(255,255,255,.025),rgba(255,255,255,0)),var(--card);box-shadow:var(--shadow);text-align:center}
    .logo{display:block;width:min(300px,72vw);height:auto;margin:0 auto 28px;filter:brightness(0) invert(1) sepia(.08) saturate(.7);opacity:.94}.code{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(92px,20vw,190px);font-weight:900;line-height:.86;letter-spacing:-.08em;color:#fff}.ghost{display:inline-block;transform:translateY(.05em);font-size:.78em;letter-spacing:-.04em}.pill{display:inline-flex;align-items:center;gap:8px;margin:28px auto 18px;padding:8px 14px;border:1px solid var(--line);border-radius:999px;color:var(--soft);font:800 11px/1 system-ui,sans-serif;letter-spacing:.16em;text-transform:uppercase}.dot{width:6px;height:6px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px rgba(202,152,118,.12)}h1{margin:0 0 12px;font-size:clamp(34px,5.4vw,58px);line-height:1;letter-spacing:-.04em;font-weight:700}p{max-width:520px;margin:0 auto;color:rgba(244,238,229,.72);font:500 16px/1.65 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:30px}a{display:inline-flex;align-items:center;justify-content:center;min-height:46px;padding:0 20px;border-radius:999px;text-decoration:none;font:800 14px system-ui,sans-serif}.primary{background:var(--ink);color:#11110f}.secondary{border:1px solid var(--line);color:var(--ink)}@media(max-width:520px){.actions{flex-direction:column}a{width:100%}}
  </style>
</head>
<body>
  <main class="card">
    <img class="logo" src="/logo-hero.png" alt="StarShots logo">
    <p class="code">4<span class="ghost">◉</span>4</p>
    <div class="pill"><span class="dot"></span>Private Route</div>
    <h1>This page drifted away</h1>
    <p>The space you are looking for does not exist, or has been tucked safely behind the curtain.</p>
    <div class="actions">
      <a class="primary" href="/">Return to home</a>
      <a class="secondary" href="https://instagram.com/starshots.id" target="_blank" rel="noopener">@starshots.id</a>
    </div>
  </main>
</body>
</html>
